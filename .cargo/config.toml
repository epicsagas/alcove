[build]
# Use Apple's ld (default on macOS) but with faster job scheduling
jobs = 8  # M2 8-core — match physical core count

[env]
# Each test that builds a Tantivy index allocates 15 MB writer buffer + mmap
# segments. Running all 147 tests in parallel on 16 GB RAM causes OOM (SIGKILL).
# 4 concurrent test threads keeps peak usage well under budget.
RUST_TEST_THREADS = { value = "4", force = false }

[target.aarch64-apple-darwin]
# zld is faster than ld on macOS for large crates; falls back to ld if absent
# rustflags = ["-C", "link-arg=-fuse-ld=zld"]  # uncomment if zld is installed

[net]
retry = 2
