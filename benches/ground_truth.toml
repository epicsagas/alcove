# Alcove search benchmark ground truth
#
# Queries and expected relevant files based on actual ~/.alcove/docs content.
# 40+ projects, 470+ files. Paths: "project/filename"
#
# Categories: architecture, product, cross-project, cjk, code, config,
#             error-messages, navigation, edge-case, negative-control
# Difficulty: easy, medium, hard

# =============================================================================
# Architecture (6 queries)
# =============================================================================

[[query]]
text = "architecture"
category = "architecture"
difficulty = "easy"
relevant_files = [
    "alcove/ARCHITECTURE.md",
    "epic-harness/ARCHITECTURE.md",
    "collet/ARCHITECTURE.md",
    "epiccounty/epiccounty.md",
]

[[query]]
text = "MCP server protocol transport"
category = "architecture"
difficulty = "medium"
relevant_files = ["alcove/ARCHITECTURE.md", "alcove/PRD.md"]

[[query]]
text = "search index tantivy BM25"
category = "architecture"
difficulty = "medium"
relevant_files = ["alcove/ARCHITECTURE.md", "alcove/strategy/BENCHMARK.md"]

[[query]]
text = "embedding model vector similarity"
category = "architecture"
difficulty = "medium"
relevant_files = ["alcove/ARCHITECTURE.md"]

[[query]]
text = "heading-based chunking markdown sections"
category = "architecture"
difficulty = "hard"
relevant_files = ["alcove/ARCHITECTURE.md"]
relevant_sections = [{ file = "alcove/ARCHITECTURE.md", heading = "## 검색 엔진 세부" }]

[[query]]
text = "hybrid search RRF reciprocal rank fusion"
